<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新竹市北門國小 三年級  基本學力檢測趨勢分析 (109-113學年)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <!-- Header -->
    <header class="max-w-6xl mx-auto mb-8 text-center">
        <h1 class="text-2xl md:text-4xl font-bold text-slate-800 mb-2">新竹市北門國小 三年級  基本學力檢測分析</h1>
        <p class="text-slate-600">統計區間：109學年 - 113學年 | 比較對象：北門、新竹市、全國</p>
    </header>

    <!-- Main Content Grid -->
    <!-- Changed to grid-cols-1 for single column layout (一科一橫區) -->
    <main class="max-w-6xl mx-auto grid grid-cols-1 gap-12">
        
        <!-- Chart 1: Chinese -->
        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg border border-slate-200">
            <h2 class="text-xl md:text-2xl font-bold text-slate-700 mb-6 flex items-center border-b pb-4">
                <span class="w-2 h-8 bg-amber-500 mr-3 rounded"></span>
                國語科 (Chinese)
            </h2>
            <div class="relative h-72 md:h-96 w-full">
                <canvas id="chartChinese"></canvas>
            </div>
            <div class="mt-4 text-sm text-slate-500 text-center bg-slate-50 py-2 rounded">
                *註：109-112為三年級，113起改為四年級測驗
            </div>
        </div>

        <!-- Chart 2: Math -->
        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg border border-slate-200">
            <h2 class="text-xl md:text-2xl font-bold text-slate-700 mb-6 flex items-center border-b pb-4">
                <span class="w-2 h-8 bg-indigo-500 mr-3 rounded"></span>
                數學科 (Math)
            </h2>
            <div class="relative h-72 md:h-96 w-full">
                <canvas id="chartMath"></canvas>
            </div>
            <div class="mt-4 text-sm text-slate-500 text-center bg-slate-50 py-2 rounded">
                *註：109-112為三年級，113起改為四年級測驗
            </div>
        </div>

        <!-- Chart 3: English -->
        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg border border-slate-200">
            <h2 class="text-xl md:text-2xl font-bold text-slate-700 mb-6 flex items-center border-b pb-4">
                <span class="w-2 h-8 bg-emerald-500 mr-3 rounded"></span>
                英語科 (English)
            </h2>
            <div class="relative h-72 md:h-96 w-full">
                <canvas id="chartEnglish"></canvas>
            </div>
            <div class="mt-4 text-sm text-slate-500 text-center bg-slate-50 py-2 rounded">
                *註：英語科數據於 112 學年起開始記錄
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="max-w-6xl mx-auto mt-12 mb-8 text-center text-slate-400 text-sm">
        <p>資料來源：縣市學生學習能力檢測 (https://saaassessment.ntcu.edu.tw/ExamRelease)</p>
        <p>Generated by Gemini AI</p>
    </footer>

    <!-- Script to Render Charts -->
    <script>
        // Data Configuration
        const years = ['109學年', '110學年', '111學年', '112學年', '113學年'];

        // Color Settings - Updated as per request
        const colors = {
            school: {
                border: '#ef4444', // Red-500 (北門 - 紅色粗線)
                bg: '#ef4444',
            },
            city: {
                border: '#3b82f6', // Blue-500 (新竹市 - 藍色線)
                bg: '#3b82f6',
            },
            nation: {
                border: '#22c55e', // Green-500 (全國 - 綠色線) - UPDATED from Gray
                bg: '#22c55e',
            }
        };

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                legend: {
                    position: 'top', // Moved legend to top for wider charts
                    align: 'end',
                    labels: {
                        usePointStyle: true,
                        padding: 20,
                        font: { size: 14, family: "'Noto Sans TC', sans-serif" }
                    }
                },
                tooltip: {
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    titleColor: '#1e293b',
                    bodyColor: '#1e293b',
                    borderColor: '#cbd5e1',
                    borderWidth: 1,
                    padding: 12,
                    displayColors: true,
                    titleFont: { size: 14 },
                    bodyFont: { size: 14 },
                    callbacks: {
                        label: function(context) {
                            let label = context.dataset.label || '';
                            if (label) {
                                label += ': ';
                            }
                            if (context.parsed.y !== null) {
                                label += context.parsed.y + '%';
                            }
                            return label;
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: false,
                    title: {
                        display: true,
                        text: '答對率 (%)',
                        font: { weight: 'bold' }
                    },
                    suggestedMin: 40,
                    suggestedMax: 90,
                    grid: {
                        color: '#f1f5f9'
                    }
                },
                x: {
                    grid: {
                        display: false
                    }
                }
            },
            elements: {
                line: {
                    tension: 0.3 // Smooth curves
                },
                point: {
                    radius: 5,
                    hoverRadius: 8
                }
            }
        };

        // 1. Chinese Chart
        const ctxChinese = document.getElementById('chartChinese').getContext('2d');
        new Chart(ctxChinese, {
            type: 'line',
            data: {
                labels: years,
                datasets: [
                    {
                        label: '北門國小',
                        data: [61, 70, 69, 77, 76],
                        borderColor: colors.school.border,
                        backgroundColor: colors.school.bg,
                        borderWidth: 4, // Thicker line for school
                        pointStyle: 'circle',
                        pointRadius: 6,
                        pointBackgroundColor: '#fff',
                        pointBorderWidth: 3
                    },
                    {
                        label: '新竹市',
                        data: [63, 75, 69, 76, 79],
                        borderColor: colors.city.border,
                        backgroundColor: colors.city.bg,
                        borderWidth: 2,
                        pointStyle: 'rectRounded'
                    },
                    {
                        label: '全國',
                        data: [60, 71, 65, 73, 76],
                        borderColor: colors.nation.border,
                        backgroundColor: colors.nation.bg,
                        borderWidth: 2,
                        borderDash: [5, 5], 
                        pointStyle: 'triangle'
                    }
                ]
            },
            options: commonOptions
        });

        // 2. Math Chart
        const ctxMath = document.getElementById('chartMath').getContext('2d');
        new Chart(ctxMath, {
            type: 'line',
            data: {
                labels: years,
                datasets: [
                    {
                        label: '北門國小',
                        data: [47, 56, 70, 66, 62],
                        borderColor: colors.school.border,
                        backgroundColor: colors.school.bg,
                        borderWidth: 4, // Thicker line for school
                        pointStyle: 'circle',
                        pointRadius: 6,
                        pointBackgroundColor: '#fff',
                        pointBorderWidth: 3
                    },
                    {
                        label: '新竹市',
                        data: [50, 63, 67, 60, 68],
                        borderColor: colors.city.border,
                        backgroundColor: colors.city.bg,
                        borderWidth: 2,
                        pointStyle: 'rectRounded'
                    },
                    {
                        label: '全國',
                        data: [50, 60, 63, 58, 64],
                        borderColor: colors.nation.border,
                        backgroundColor: colors.nation.bg,
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointStyle: 'triangle'
                    }
                ]
            },
            options: commonOptions
        });

        // 3. English Chart
        const ctxEnglish = document.getElementById('chartEnglish').getContext('2d');
        new Chart(ctxEnglish, {
            type: 'line',
            data: {
                labels: years,
                datasets: [
                    {
                        label: '北門國小',
                        data: [null, null, null, 75, 76], 
                        borderColor: colors.school.border,
                        backgroundColor: colors.school.bg,
                        borderWidth: 4, // Thicker line for school
                        pointStyle: 'circle',
                        pointRadius: 6,
                        pointBackgroundColor: '#fff',
                        pointBorderWidth: 3,
                        spanGaps: false
                    },
                    {
                        label: '新竹市',
                        data: [null, null, null, 80, 78],
                        borderColor: colors.city.border,
                        backgroundColor: colors.city.bg,
                        borderWidth: 2,
                        pointStyle: 'rectRounded',
                        spanGaps: false
                    },
                    {
                        label: '全國',
                        data: [null, null, null, 74, 70],
                        borderColor: colors.nation.border,
                        backgroundColor: colors.nation.bg,
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointStyle: 'triangle',
                        spanGaps: false
                    }
                ]
            },
            options: {
                ...commonOptions,
                scales: {
                    ...commonOptions.scales,
                    y: {
                        ...commonOptions.scales.y,
                        suggestedMin: 60 
                    }
                }
            }
        });
    </script>
</body>
</html>
